<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Document viewer</title>
  <meta name="robots" content="noindex" />
  <style>
    :root{--bg:#0b1220;--card:#101a30;--text:#e8eefc;--muted:#b8c4e6;--border:rgba(255,255,255,0.10);--accent:#7c5cff;}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);}
    .wrap{max-width:980px;margin:0 auto;padding:30px 18px 80px;}
    .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
    a.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1px solid var(--border);text-decoration:none;background:rgba(255,255,255,0.06);color:var(--text)}
    a.primary{background:linear-gradient(135deg, rgba(124,92,255,0.95), rgba(124,92,255,0.70));border-color:rgba(124,92,255,0.6)}
    .card{background:rgba(16,26,48,0.75);border:1px solid var(--border);border-radius:16px;padding:18px;}
    .title{font-size:18px;font-weight:800;margin:0 0 6px;}
    .meta{color:var(--muted);font-size:13px;margin:0 0 14px;word-break:break-all;}
    pre{white-space:pre-wrap;word-wrap:break-word;color:var(--muted);}
    table{border-collapse:collapse;width:100%;font-size:14px}
    th,td{border:1px solid var(--border);padding:8px;vertical-align:top}
    th{background:rgba(255,255,255,0.04)}
    code{background:rgba(255,255,255,0.06);border:1px solid var(--border);padding:2px 6px;border-radius:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <a class="btn" href="../">← Back</a>
      <a class="btn primary" id="download" href="#" target="_blank" rel="noopener">Download</a>
      <span class="meta" id="status"></span>
    </div>

    <div class="card">
      <div class="title" id="title">Loading…</div>
      <div class="meta" id="path"></div>
      <div id="content"><pre>Loading…</pre></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get('file');
    const title = params.get('title') || (file || 'Document');

    const baseRaw = 'https://github.com/suz-uk1/axel/raw/main/docs/';

    const titleEl = document.getElementById('title');
    const pathEl = document.getElementById('path');
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('content');
    const dl = document.getElementById('download');

    function esc(s){return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

    if (!file) {
      titleEl.textContent = 'Missing file parameter';
      pathEl.innerHTML = 'Use <code>?file=downloads/soa-skeleton.md</code>';
      dl.style.display = 'none';
    } else {
      const url = baseRaw + file.replace(/^\/+/, '');
      titleEl.textContent = title;
      pathEl.textContent = url;
      dl.href = url;

      fetch(url).then(r => {
        statusEl.textContent = r.ok ? '' : ('Fetch failed: ' + r.status);
        return r.text();
      }).then(txt => {
        const lower = file.toLowerCase();
        if (lower.endsWith('.md')) {
          contentEl.innerHTML = marked.parse(txt);
        } else if (lower.endsWith('.csv')) {
          const rows = txt.trim().split(/\r?\n/).map(l => l.split(','));
          const thead = rows.shift() || [];
          let html = '<table><thead><tr>' + thead.map(c => '<th>' + esc(c) + '</th>').join('') + '</tr></thead><tbody>';
          for (const row of rows.slice(0, 200)) {
            html += '<tr>' + row.map(c => '<td>' + esc(c) + '</td>').join('') + '</tr>';
          }
          html += '</tbody></table>';
          if (rows.length > 200) html += '<p class="meta">Showing first 200 rows.</p>';
          contentEl.innerHTML = html;
        } else {
          contentEl.innerHTML = '<pre>' + esc(txt) + '</pre>';
        }
      }).catch(e => {
        statusEl.textContent = 'Error: ' + e;
        contentEl.innerHTML = '<pre>' + esc(String(e)) + '</pre>';
      });
    }
  </script>
</body>
</html>
